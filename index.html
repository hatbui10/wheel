<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lucky Wheel</title>




<style>
/* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#1f1c2c,#928dab);
    display:flex;
    flex-direction:column;
    justify-content:flex-start; /* Đưa lên trên */
    align-items:center;
    padding-top:30px; /* Cách mép trên 30px */
    color:white;
}

/* Tiêu đề */
h1{
    margin:20px;
    font-size:32px;
    letter-spacing:2px;
    text-shadow:0 0 15px rgba(255,255,255,0.5);
}

/* Wrapper */
.wheel-wrapper{
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:30px;
}

/* Canvas bánh xe */
canvas{
    border-radius:50%;
    box-shadow:
        0 0 30px rgba(255,255,255,0.3),
        0 0 60px rgba(255,255,255,0.2),
        0 0 90px rgba(255,255,255,0.1);
    transition:transform 3s cubic-bezier(.17,.67,.28,1);
}

/* Mũi tên */
.pointer{
    position:absolute;
    top:-30px;
    left:50%;
    transform:translateX(-50%);
    width:0;
    height:0;
    border-left:20px solid transparent;
    border-right:20px solid transparent;
    border-top:35px solid #ff3cac;
    filter:drop-shadow(0 0 15px #ff3cac);
    z-index:10;
}

/* Nút */
button{
    padding:14px 40px;
    font-size:18px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg,#ff3cac,#784ba0);
    color:white;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

button:hover{
    transform:translateY(-3px) scale(1.07);
    box-shadow:0 12px 25px rgba(0,0,0,0.4);
}

button:active{
    transform:scale(0.95);
}

/* Hiệu ứng quay */
canvas.spinning{
    animation:glow 1s infinite alternate;
}

@keyframes glow{
    from{
        box-shadow:0 0 20px #fff;
    }
    to{
        box-shadow:0 0 60px #ff3cac;
    }
}

#resultBox{
    margin:100px auto;
    padding:12px 25px;
    min-width:200px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    border-radius:15px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(8px);
    box-shadow:0 0 20px rgba(255,255,255,0.2);
    transition:0.3s;
}

#resultBox.active{
    background:linear-gradient(45deg,#ff3cac,#784ba0);
    box-shadow:0 0 25px #ff3cac;
}






</style>





</head>

<body>

<h1>🎡 Lucky Wheel</h1>

<div id="resultBox">Kết quả: --</div>

<div class="wheel-wrapper">
    <div class="pointer"></div>
    <canvas id="wheel" width="400" height="400"></canvas>
</div>

<button onclick="spin()">QUAY</button>





<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const options = ["100$", "200$", "500$", "Chúc may mắn", "1000$", "Mất lượt"];
const colors = ["#ff595e","#ffca3a","#8ac926","#1982c4","#6a4c93","#ff924c"];

const center = 200;
const radius = 200;
const arc = (2 * Math.PI) / options.length;

function drawWheel(){
    for(let i = 0; i < options.length; i++){
        const angle = i * arc - Math.PI/2;

        ctx.beginPath();
        ctx.moveTo(center, center);
        ctx.arc(center, center, radius, angle, angle + arc);
        ctx.fillStyle = colors[i];
        ctx.fill();

        ctx.save();
        ctx.translate(center, center);
        ctx.rotate(angle + arc/2);
        ctx.fillStyle = "white";
        ctx.font = "bold 16px Arial";
        ctx.textAlign = "center";
        ctx.fillText(options[i], 120, 5);
        ctx.restore();
    }
}

drawWheel();

let spinning = false;
let currentRotation = 0;






function spin(){
    if(spinning) return;
    spinning = true;

    const extraSpins = 4;
    const randomDegree = Math.floor(Math.random() * 360);

    currentRotation += 360 * extraSpins + randomDegree;

    canvas.style.transform = `rotate(${currentRotation}deg)`;

    setTimeout(()=>{
    let actualDegree = currentRotation % 360;
    let corrected = (360 - actualDegree) % 360;

    const slice = 360 / options.length;
    const index = Math.floor(corrected / slice);

    // Hiển thị kết quả trong ô
    showResult(options[index]);

    spinning = false;

},2500);
}

function showResult(text){
    const box = document.getElementById("resultBox");
    box.textContent = "Kết quả: " + text;
    box.classList.add("active");

   
}




</script>

</body>
</html>
